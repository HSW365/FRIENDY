workflows:
  friendy-ios-release: &friendy_ios_base
    name: Friendy — iOS TestFlight Release
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: friendy_ios_asc_key   # ← Codemagic → Team → Integrations → App Store Connect, name it exactly this
    environment:
      groups:
        - friendy_ios   # must contain the vars listed below
      vars:
        APP_ID: com.hsw365.friendy
        XCODE_WORKSPACE: "mobile/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      cocoapods: default
      node: 20.11.1
    triggering:
      events: []   # manual trigger only — start builds from the Codemagic UI/CLI

    scripts:
      - name: Install mobile dependencies
        script: |
          cd mobile
          npm install

      - name: Bundle native bridge (RevenueCat/Capacitor JS)
        script: |
          cd mobile
          npm run build

      - name: Add + sync iOS platform
        script: |
          cd mobile
          npx cap add ios
          npx cap sync ios

      - name: Inject privacy manifest + Info.plist compliance keys
        script: |
          cd "$CM_BUILD_DIR"
          bash mobile/scripts/postcap.sh

      - name: Set App Store Connect API key env vars for CocoaPods/xcodebuild
        script: |
          # Codemagic's app_store_connect integration exposes
          # $APP_STORE_CONNECT_KEY_IDENTIFIER / _ISSUER_ID / _PRIVATE_KEY automatically
          echo "Using App Store Connect key ${APP_STORE_CONNECT_KEY_IDENTIFIER}"

      - name: Install CocoaPods
        script: |
          cd mobile/ios/App
          pod install

      - name: Set up code signing (automatic, via App Store Connect API key)
        script: |
          xcode-project use-profiles || true
          app-store-connect fetch-signing-files "$APP_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Bump build number to something unique
        script: |
          cd mobile/ios/App
          agvtool new-version -all "$(date +%Y%m%d%H%M)"

      - name: Build & archive
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - mobile/ios/App/build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false   # flip to true once you're ready to submit for review
      email:
        recipients:
          - hsw365media@gmail.com
        notify:
          success: true
          failure: true

  friendy-ios-app-store-submit:
    <<: *friendy_ios_base
    name: Friendy — Submit for App Store Review
    triggering:
      events: []
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: true
        release_type: MANUAL
